<nav class="navbar">
	<div class="navbar-icon">
		<img src="/assets/images/logo.png" alt="Logo">
	</div>

	<button class="navbar-toggle" type="button" aria-label="Abrir menu" [class.open]="menuOpen"
		(click)="toggleMobileMenu($event)">
		<span></span>
		<span></span>
		<span></span>
	</button>

	<div class="navbar-links" [class.open]="menuOpen" (click)="$event.stopPropagation()">
		<a routerLink="/home" routerLinkActive="active-link" (click)="closeMobileMenu()">Inicio</a>
		<a routerLink="/packages" routerLinkActive="active-link" (click)="closeMobileMenu()">Paquetes</a>
		<a routerLink="/gallery" routerLinkActive="active-link" (click)="closeMobileMenu()">Galería</a>
		<a routerLink="/panel-admin" routerLinkActive="active-link" (click)="closeMobileMenu()">Panel Administrativo</a>
	</div>

	<!-- SI NO ESTA LOGUEADO -->
	<div class="navbar-auth" [class.open]="menuOpen" *ngIf="!authService.isAuthenticated()" (click)="$event.stopPropagation()">
		<a routerLink="/auth/login" class="btn-ingresar" (click)="closeMobileMenu()">Ingresar</a>
		<a routerLink="/auth/register" class="btn-registrarse" (click)="closeMobileMenu()">Registrarse</a>
	</div>

	<!-- SI ESTA LOGUEADO -->
	<div class="navbar-user" [class.open]="menuOpen" *ngIf="authService.isAuthenticated()" (click)="$event.stopPropagation()">
		<div class="user-info" (click)="toggleDropdown($event)">
			<img [src]="'https://ui-avatars.com/api/?name=' + user?.firstName + '&background=3fa2db&color=fff&size=120'"
				alt="user" class="user-avatar" />
			<div class="user-text">
				<h4>{{ user?.firstName }} {{ user?.lastName }}</h4>
				<span *ngIf="displayRole">
					{{ displayRole }}
				</span>
			</div>
			<i class="fa-solid fa-chevron-down" [class.rotate]="dropdownOpen"></i>
		</div>

		<div class="user-dropdown" *ngIf="dropdownOpen">
			<a routerLink="/panel-admin">Mi perfil</a>
			<a routerLink="/settings">Configuración</a>
			<button (click)="logout()">Salir</button>
		</div>
	</div>
</nav>
