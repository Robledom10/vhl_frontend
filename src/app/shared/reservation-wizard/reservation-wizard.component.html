<div class="modal-overlay" (click)="close()">

	<div class="modal-container" (click)="$event.stopPropagation()">
		<button class="close-btn" (click)="close()">×</button>

		<div class="modal-scroll">

			<div class="modal-content">

				<!-- STEPPER -->

				<div class="steps-wrapper">
					<div class="step-item">
						<div class="step" [class.active]="currentStep >= 1">
							<i class="fa-solid fa-check" *ngIf="currentStep > 1"></i>
							<span *ngIf="currentStep <= 1">1</span>
						</div>
						<p [class.active]="currentStep === 1">
							Titular
						</p>
					</div>

					<div class="line" [class.active]="currentStep >= 2"></div>

					<div class="step-item">
						<div class="step" [class.active]="currentStep >= 2">
							<i class="fa-solid fa-check" *ngIf="currentStep > 2"></i>
							<span *ngIf="currentStep <= 2">2</span>
						</div>
						<p [class.active]="currentStep === 2">
							Viajeros
						</p>
					</div>

					<div class="line" [class.active]="currentStep >= 3"></div>

					<div class="step-item">
						<div class="step" [class.active]="currentStep >= 3">
							<i class="fa-solid fa-check" *ngIf="currentStep > 3"></i>
							<span *ngIf="currentStep <= 3">3</span>
						</div>
						<p [class.active]="currentStep === 3">
							Reserva
						</p>
					</div>

					<div class="line" [class.active]="currentStep >= 4"></div>

					<div class="step-item">
						<div class="step" [class.active]="currentStep >= 4">
							<i class="fa-solid fa-check" *ngIf="currentStep > 4"></i>
							<span *ngIf="currentStep <= 4">4</span>
						</div>
						<p [class.active]="currentStep === 4">
							Resumen
						</p>
					</div>
				</div>

				<h2 class="modal-title">
					Reserva de <span>Cartagena</span>
				</h2>

				<div class="divider"></div>

				<div *ngIf="currentStep === 1" class="step-content">

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Nombre</label>
					</div>

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Apellido</label>
					</div>

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Documento</label>
					</div>

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Teléfono</label>
					</div>
				</div>

				<div *ngIf="currentStep === 2" class="step-content">

					<div class="traveler-card">

						<h3>Acompañante #1</h3>

						<div class="form-group">
							<input type="text" placeholder=" ">
							<label>Nombre</label>
						</div>

						<div class="form-group">
							<input type="text" placeholder=" ">
							<label>Documento</label>
						</div>

					</div>

				</div>

				<div *ngIf="currentStep === 3" class="step-content">

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Nombre contacto emergencia</label>
					</div>

					<div class="form-group">
						<input type="text" placeholder=" ">
						<label>Teléfono emergencia</label>
					</div>

					<div class="form-group">
						<textarea placeholder=" "></textarea>
						<label>Observaciones</label>
					</div>

				</div>

				<div *ngIf="currentStep === 4">

					<div class="summary-card">

						<h3>Resumen de la reserva</h3>

						<div class="summary-row">
							<span>Destino</span>
							<strong>Cartagena</strong>
						</div>

						<div class="summary-row">
							<span>Viajeros</span>
							<strong>4</strong>
						</div>

						<div class="summary-row">
							<span>Total</span>
							<strong>$3.400.000</strong>
						</div>

					</div>

				</div>
				<div class="actions">
					<button *ngIf="currentStep > 1" class="btn-secondary" (click)="previousStep()">
						Anterior
					</button>

					<div></div>

					<button *ngIf="currentStep < 4" class="btn-primary" (click)="nextStep()">
						Siguiente
					</button>

					<button *ngIf="currentStep === 4" class="btn-primary">
						Confirmar reserva
					</button>
				</div>
			</div>
		</div>
	</div>
</div>
