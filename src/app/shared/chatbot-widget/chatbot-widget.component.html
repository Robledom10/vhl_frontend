<div class="chatbot-wrapper">

  <!-- ── Burbuja de bienvenida ────────────────────────────── -->
  <div class="speech-bubble" *ngIf="showBubble && !isOpen" (click)="openChat()">
    <button class="bubble-x" (click)="$event.stopPropagation(); showBubble = false">×</button>
    <div class="bubble-content">
      <img src="assets/images/sharky.png" alt="Sharky" class="bubble-shark" />
      <p>Hey, soy Sharky 🦈 Tu parcero digital pa' resolver dudas. ¿Qué quieres saber?</p>
    </div>
  </div>

  <!-- ── Panel de chat ─────────────────────────────────────── -->
  <div class="chat-panel" [class.open]="isOpen">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-info">
        <div class="header-avatar">
          <img src="assets/images/sharky.png" alt="Sharky" class="header-avatar-img" />
        </div>
        <div class="header-text">
          <span class="header-name">Sharky</span>
          <span class="header-status">● En línea</span>
        </div>
      </div>
      <button class="btn-close-panel" (click)="closeChat()" aria-label="Cerrar chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Mensajes -->
    <div class="chat-messages">
      <div
        *ngFor="let msg of messages"
        class="msg-row"
        [class.msg-row--user]="msg.role === 'user'"
        [class.msg-row--bot]="msg.role === 'bot'"
      >
        <div class="msg-bubble" [class.doc-bubble]="msg.isDocument">
          <span *ngIf="msg.isDocument" class="doc-badge">📄 Documento analizado</span>
          <p>{{ msg.content }}</p>
        </div>
      </div>

      <!-- Indicador de carga -->
      <div class="msg-row msg-row--bot" *ngIf="isLoading">
        <div class="msg-bubble typing">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div #messagesEnd></div>
    </div>

    <!-- Preview de archivo seleccionado -->
    <div class="file-preview" *ngIf="selectedFile">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span>{{ selectedFile.name }}</span>
      <button class="file-remove" (click)="clearFile()">×</button>
    </div>

    <!-- Input area -->
    <div class="chat-input-area">
      <label class="btn-attach" title="Subir PDF o imagen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        <input
          type="file"
          accept=".pdf,.jpg,.jpeg,.png,.webp"
          (change)="onFileSelected($event)"
          hidden
        />
      </label>

      <input
        class="chat-input"
        type="text"
        placeholder="Escribe tu mensaje..."
        [(ngModel)]="userInput"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading"
        autocomplete="off"
      />

      <button
        class="btn-send"
        (click)="sendMessage()"
        [disabled]="isLoading || (!userInput.trim() && !selectedFile)"
        aria-label="Enviar"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- ── Botón flotante (Sharky) ───────────────────────────── -->
  <button
    class="chat-trigger"
    (click)="toggleChat()"
    [class.trigger--open]="isOpen"
    [attr.aria-label]="isOpen ? 'Cerrar chat' : 'Abrir chat con Sharky'"
  >
    <img *ngIf="!isOpen" src="assets/images/sharky.png" alt="Sharky" class="trigger-img" />
    <svg *ngIf="isOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3fa2db" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    <span class="notification-dot" *ngIf="showBubble && !isOpen"></span>
  </button>

</div>
