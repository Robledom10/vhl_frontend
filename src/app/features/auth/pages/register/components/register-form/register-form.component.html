<div class="form-register">

	<h1>Comienza Tu Nueva Aventura</h1>
	<p>Regístrate y empieza a descubrir destinos increíbles, excursiones únicas y experiencias diseñadas especialmente para ti.</p>
	<form action="" method="post">
		<div class="form-group">
			<input type="text" id="name" name="name" placeholder="Nombre" required />
			<label for="name">Nombre</label>
		</div>

		<div class="form-group">
			<input type="text" id="last-name" name="last-name" placeholder="Apellido" required />
			<label for="last-name">Apellido</label>
		</div>

		<div class="form-group">
			<input type="email" id="email" name="email" placeholder="Correo electrónico" required />
			<label for="email">Correo electrónico</label>
		</div>

		<div class="form-group">
			<input type="date" id="birthdate" name="birthdate" placeholder="Fecha de nacimiento" required />
			<label for="birthdate">Fecha de nacimiento</label>
		</div>

		<div class="form-group form-group-password">
			<input type="password" id="password" name="password" placeholder="Contraseña" required />
			<label for="password">Contraseña</label>
			<i class="fa-regular fa-eye" (click)="togglePasswordVisibility('password')"></i>
			<i class="fa-regular fa-eye-slash" (click)="togglePasswordVisibility('password')"></i>
		</div>

		<div class="form-group form-group-password">
			<input type="password" id="confirm-password" name="confirm-password" placeholder="Confirmar contraseña" required />
			<label for="confirm-password">Confirmar contraseña</label>
			<i class="fa-regular fa-eye" (click)="togglePasswordVisibility('confirm-password')"></i>
			<i class="fa-regular fa-eye-slash" (click)="togglePasswordVisibility('confirm-password')"></i>
		</div>

		<div class="terms-group">
			<input type="checkbox" id="terms" name="terms" required />
			<label for="terms">Aceptar términos y condiciones</label>
		</div>

		<button type="submit">Registrarse</button>
	</form>

	<div class="login-text">
		Ya tienes cuenta? <a href="/src/app/features/auth/pages/login/login.component.html">Inicia Sesión</a>
	</div>

	<div class="divider">o inicia sesión con</div>

	<div class="social-buttons">
		<button class="social-button">
			<img src="google-icon.svg" alt="Google">
			Google
		</button>
		<button class="social-button">
			<img src="facebook-icon.svg" alt="Facebook">
			Facebook
		</button>
		<button class="social-button">
			<img src="phone-icon.svg" alt="Celular">
			Celular
		</button>
	</div>
</div>
