<div class="form-login">

	<div class="logo">
		<a href="#"><img src="assets/images/Logo.png" alt="logo-hl"></a>
	</div>

	<h1>Conecta con tu Próximo Destino</h1>
	<p>Inicia sesión y descubre destinos increíbles, excursiones únicas y experiencias diseñadas para que cada viaje sea inolvidable.</p>

	<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
		<div class="form-group">
			<input type="email" id="email" name="email" formControlName="email" placeholder="Correo electrónico"
				[class.ng-invalid]="f.email.invalid && f.email.touched" [class.ng-touched]="f.email.touched" />
			<label for="email">Correo electrónico</label>

			<span *ngIf="f.email.touched && f.email.invalid">
				Email inválido
			</span>
		</div>

		<div class="form-group form-group-password">
			<input type="password" id="password" name="password" formControlName="password" placeholder="Contraseña"
				[class.ng-invalid]="f.password.invalid && f.password.touched || loginError"
				[class.ng-touched]="f.password.touched || loginError" />
			<label for="password">Contraseña</label>
			<i class="fa-regular fa-eye" (click)="togglePasswordVisibility('password')"></i>
			<i class="fa-regular fa-eye-slash" (click)="togglePasswordVisibility('password')"></i>

			<span *ngIf="f.password.touched && f.password.invalid">
				La contraseña es obligatoria
			</span>

			<span *ngIf="loginError">
				Contraseña incorrecta
			</span>
		</div>

		<button type="submit" [disabled]="isLoading">
			<span *ngIf="!isLoading">Ingresar</span>
			<span *ngIf="isLoading">Ingresando...</span>
		</button>
	</form>

	<div class="login-text">
		¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
	</div>

	<app-login-types></app-login-types>
</div>
