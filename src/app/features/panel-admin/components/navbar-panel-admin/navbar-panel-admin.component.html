<div class="sidebar">

	<!-- PERFIL -->
	<div class="sidebar-profile">
		<img [src]="'https://ui-avatars.com/api/?name=' + user?.firstName + '&background=3fa2db&color=fff&size=120'"
			alt="profile" class="profile-image" />
		<h3>{{ user?.firstName }} {{ user?.lastName }}</h3>

		<span *ngIf="displayRole">{{ displayRole }}</span>
	</div>

	<!-- MENU ADMIN -->
	<a *ngFor="let item of adminMenu" [routerLink]="item.route" routerLinkActive="active" class="menu-item">
		<div class="menu-left">
			<i [class]="item.icon"></i>

			<span class="menu-label">
				{{ item.label }}
			</span>
		</div>

		<!-- BADGE -->
		<span class="badge" *ngIf="item.badge">
			{{ item.badge }}
		</span>
	</a>
</div>
