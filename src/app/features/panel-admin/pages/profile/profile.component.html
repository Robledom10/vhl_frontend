<div class="content">
	<!-- PERFIL -->
	<div class="profile-header">

		<div class="image-profile">
			<img src="https://i.pravatar.cc/300" alt="profile" class="profile-image" />
		</div>

		<div class="profile-info">
			<h2>{{ user?.firstName }} {{ user?.lastName }}</h2>
			<p class="role" *ngIf="displayRole">{{ displayRole }}</p>
			<button class="btn-edit" *ngIf="!isEditing" (click)="enableEdit()">Editar perfil</button>
		</div>
	</div>

	<!-- FORMULARIO -->
	<form *ngIf="isEditing" [formGroup]="profileForm" class="edit-form">

		<!-- NOMBRE Y APELLIDO -->
		<div class="form-row">
			<div class="form-group">
				<input type="text" formControlName="firstName" placeholder="Nombre" [class.ng-invalid]="submitted"
					[class.ng-touched]=" f.firstName.touched" autofocus />
				<label for="firstName">Nombre</label>

				<span *ngIf="f.firstName.touched && f.firstName.errors?.['minlength']">
					El nombre debe tener al menos 3 caracteres
				</span>
			</div>

			<div class="form-group">
				<input type="text" formControlName="lastName" placeholder="Apellido" [class.ng-invalid]="submitted"
					[class.ng-touched]="f.lastName.touched" />
				<label for="lastName">Apellido</label>
				<span *ngIf="submitted && f.lastName.errors?.['required']">El apellido es obligatorio</span>
			</div>
		</div>

		<!-- EMAIL -->
		<div class="form-group">
			<input type="email" formControlName="email" placeholder="Correo electrónico" [class.ng-invalid]="submitted"
				[class.ng-touched]="f.email.touched" />
			<label for="email">Correo electrónico</label>
		</div>

		<!-- DOCUMENTO -->
		<div class="form-row">
			<div class="form-group form-group-small custom-select-group">
				<div class="custom-select" [class.open]="documentDropdownOpen" [class.selected]="selectedDocumentType"
					[class.invalid]="submitted && f.documentType.invalid" (click)="toggleDocumentDropdown($event)">

					<div class="custom-select-value">{{ selectedDocumentType || 'Tipo documento' }}</div>

					<i class="fa-solid fa-angle-down select-icon"></i>

					<div class="custom-select-dropdown" *ngIf="documentDropdownOpen" (click)="$event.stopPropagation()">

						<div class="custom-option" *ngFor="let option of documentTypes"
							[class.active]="selectedDocumentType === option"
							(click)="selectDocumentType(option); $event.stopPropagation()">
							{{ option }}
						</div>

					</div>
				</div>

				<label [class.active]="selectedDocumentType">Tipo documento</label>
			</div>

			<div class="form-group form-group-large">
				<input type="text" formControlName="documentNumber" placeholder="Número documento"
					oninput="this.value = this.value.replace(/[^0-9]/g, '')"
					[class.ng-invalid]="submitted && f.documentNumber.errors?.['required']"
					[class.ng-touched]="f.documentNumber.touched" />

				<label for="documentNumber">Número documento</label>

				<span
					*ngIf="f.documentNumber.touched &&(f.documentNumber.errors?.['minlength'] ||f.documentNumber.errors?.['maxlength'])">
					Número de documento inválido
				</span>
			</div>
		</div>

		<!-- TELÉFONO -->
		<div class="form-group">
			<input type="text" id="phone" formControlName="phone" placeholder="Teléfono" id="phone"
				oninput="this.value = this.value.replace(/[^0-9]/g, '')" [class.ng-invalid]="submitted"
				[class.ng-touched]="f.email.touched" />
			<label for="phone">Teléfono</label>

			<span *ngIf="f.phone.touched && (f.phone.errors?.['minlength'] || f.phone.errors?.['maxlength'])">
				Número de teléfono inválido
			</span>
		</div>

		<!-- FECHA -->
		<div class="form-group">
			<input type="date" formControlName="birthDate" id="birthDate"
				[class.ng-invalid]="submitted && f.birthDate.errors?.['required']"
				[class.ng-touched]="f.birthDate.touched" />
			<label for="birthDate">Fecha nacimiento</label>
		</div>

		<!-- UBICACIÓN -->
		<div class="form-row">
			<div class="form-group">
				<input type="text" formControlName="state" id="state" placeholder="Departamento"
					[class.ng-invalid]="submitted && f.state.errors?.['required']"
					[class.ng-touched]="f.state.touched" />
				<label for="state">Departamento</label>
			</div>

			<div class="form-group">
				<input type="text" formControlName="city" id="city" placeholder="Ciudad"
					[class.ng-invalid]="submitted && f.city.errors?.['required']" [class.ng-touched]="f.city.touched" />
				<label for="city">Ciudad</label>
			</div>
		</div>

		<!-- DIRECCIÓN -->
		<div class="form-group">
			<input type="text" formControlName="address" id="address" placeholder="Dirección"
				[class.ng-invalid]="submitted && f.address.errors?.['required']"
				[class.ng-touched]="f.address.touched" />
			<label for="address">Dirección</label>
		</div>

		<!-- BOTONES -->
		<div class="buttons">
			<button type="button" class="btn-cancel" (click)="cancelEdit()">Cancelar</button>
			<button type="button" class="btn-save" (click)="saveProfile()">Guardar</button>
		</div>
	</form>
</div>
