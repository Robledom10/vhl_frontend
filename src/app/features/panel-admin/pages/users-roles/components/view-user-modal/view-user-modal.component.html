<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">

	<div class="view-modal" (click)="$event.stopPropagation()">

		<!-- HEADER -->
		<div class="modal-header">
			<button class="close-btn" (click)="closeModal()">
				<i class="fa-solid fa-xmark"></i>
			</button>

			<h2>Información <span>del Usuario</span></h2>
		</div>

		<!-- PROFILE -->
		<div class="profile-section">

			<img [src]="user?.image" class="profile-image" />

			<h3>{{ user?.name }}</h3>

			<span>{{ user?.role }}</span>
		</div>

		<!-- FORM -->
		<form>

			<div class="form-group">
				<input type="text" [value]="user?.name" readonly />
				<label class="active">Nombre completo</label>
			</div>

			<div class="form-group">
				<input type="text" [value]="user?.email" readonly />
				<label class="active">Correo electrónico</label>
			</div>

			<div class="form-group">
				<input type="text" [value]="user?.role" readonly />
				<label class="active">Rol</label>
			</div>

			<div class="form-group">
				<input type="text" [value]="user?.status" readonly />
				<label class="active">Estado</label>
			</div>

			<div class="form-group">
				<input type="text" [value]="user?.phone || 'No registrado'" readonly />
				<label class="active">Teléfono</label>
			</div>

			<!-- ACTIONS -->
			<div class="modal-actions">

				<button type="button" class="btn-close" (click)="closeModal()">
					Cerrar
				</button>

			</div>

		</form>

	</div>
</div>
