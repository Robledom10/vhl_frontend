<div class="map-wrapper">

  <!-- ─── Header ─────────────────────────────────────────────────── -->
  <div class="route-header">
    <div class="route-meta">
      <span class="route-tag">Destinos Top</span>
      <span class="route-stops">Descubre los destinos favoritos para tu próxima aventura</span>
    </div>

    <div class="dropdown-container" (clickOutside)="closeDropdown()">
      <button class="destination-trigger" (click)="toggleDropdown()" [class.open]="isDropdownOpen">
        <span class="trigger-inner">
          <!-- Imagen real cuando hay destino seleccionado -->
          <img *ngIf="selectedDestination" [src]="selectedDestination.thumbnail || selectedDestination.image"
            [alt]="selectedDestination.name" class="trigger-thumb" />
          <!-- Ícono genérico si no hay selección -->
          <span class="trigger-icon-placeholder" *ngIf="!selectedDestination">
            <i class="fa-solid fa-bus-simple"></i>
          </span>
          <span class="trigger-texts">
            <span class="trigger-text">
              {{ selectedDestination ? selectedDestination.name : 'Selecciona un destino' }}
            </span>
            <span class="trigger-sub" *ngIf="selectedDestination">{{ selectedDestination.label }}</span>
          </span>
        </span>
        <svg class="chevron" [class.rotated]="isDropdownOpen" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>

      <!-- Panel dropdown -->
      <div class="dropdown-panel" *ngIf="isDropdownOpen">
        <div class="panel-label">Paradas del recorrido</div>

        <button class="dest-item" *ngFor="let dest of destinations; let i = index" (click)="selectDestination(dest)"
          [class.active]="selectedDestination?.id === dest.id">
          <div class="dest-thumb-wrap">
            <img *ngIf="dest.thumbnail || dest.image" [src]="dest.thumbnail || dest.image" [alt]="dest.name"
              class="dest-thumb" />
            <div class="dest-thumb-placeholder" *ngIf="!dest.thumbnail && !dest.image">
              <span>📍</span>
            </div>
          </div>
          <div class="dest-info">
            <span class="dest-name">{{ dest.name }}</span>
            <span class="dest-label">{{ dest.label }}</span>
          </div>
          <svg *ngIf="selectedDestination?.id === dest.id" class="check-icon" width="16" height="16" viewBox="0 0 16 16"
            fill="none">
            <path d="M3 8l3.5 3.5L13 5" stroke="var(--color-primario)" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>

        <button class="view-all-btn" (click)="showAll()">
          <i class="fa-regular fa-eye"></i>
          Ver ruta completa
        </button>
      </div>
    </div>
  </div>

  <!-- ─── Mapa + Panel ────────────────────────────────────────────── -->
  <div class="map-and-panel">
    <div id="travel-map" class="travel-map"></div>

    <!-- Panel detalle -->
    <div class="detail-panel" *ngIf="selectedDestination" [class.loading]="isLoadingPhotos">

      <!-- Galería -->
      <div class="photo-gallery" *ngIf="!isLoadingPhotos">
        <div class="photo-track" *ngIf="selectedDestination.photos.length > 0">
          <img [src]="selectedDestination.photos[activePhotoIndex]" [alt]="selectedDestination.name"
            class="gallery-img" />
          <button class="photo-nav prev" (click)="prevPhoto()" *ngIf="activePhotoIndex > 0">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M10 4L6 8l4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="photo-nav next" (click)="nextPhoto()"
            *ngIf="activePhotoIndex < selectedDestination.photos.length - 1">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <div class="photo-dots">
            <span *ngFor="let p of selectedDestination.photos; let pi = index" class="dot"
              [class.active]="pi === activePhotoIndex" (click)="activePhotoIndex = pi"></span>
          </div>
        </div>

        <div class="no-photo-placeholder" *ngIf="selectedDestination.photos.length === 0">
          <span class="placeholder-emoji">📍</span>
        </div>
      </div>

      <!-- Skeleton -->
      <div class="photo-skeleton" *ngIf="isLoadingPhotos">
        <div class="skeleton-shimmer"></div>
      </div>

      <!-- Info -->
      <div class="detail-body">
        <div class="detail-top">
          <!-- Miniatura cuadrada en lugar del emoji/link -->
          <img *ngIf="selectedDestination.thumbnail || selectedDestination.image"
            [src]="selectedDestination.thumbnail || selectedDestination.image" [alt]="selectedDestination.name"
            class="detail-dest-thumb" />
          <div class="detail-dest-placeholder" *ngIf="!selectedDestination.thumbnail && !selectedDestination.image">
            📍
          </div>
          <div>
            <h3 class="detail-name">{{ selectedDestination.name }}</h3>
            <span class="detail-city">{{ selectedDestination.label }}</span>
          </div>
        </div>
        <div class="detail-divider"></div>
        <p class="detail-desc">{{ selectedDestination.description }}</p>
      </div>

    </div>
  </div>
</div>
